<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Analítico Financeiro</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header">
    <h1>Dashboard Financeiro</h1>
    <div class="header-actions">
      <span class="user-info">Olá, <strong id="user-name"></strong></span>
      <button id="btn-add-transaction" class="btn btn-primary">+ Nova Transação</button>
      <button id="btn-logout" class="btn btn-outline">Sair</button>
    </div>
  </header>

  <main class="dashboard">
    <section class="summary-cards">
      <div class="card card-income">
        <h3>Receitas</h3>
        <p id="total-income" class="amount">R$ 0,00</p>
      </div>
      <div class="card card-expense">
        <h3>Despesas</h3>
        <p id="total-expense" class="amount">R$ 0,00</p>
      </div>
      <div class="card card-balance">
        <h3>Saldo</h3>
        <p id="total-balance" class="amount">R$ 0,00</p>
      </div>
    </section>

    <section class="filters">
      <div class="filter-group">
        <label for="filter-search">Buscar</label>
        <input type="text" id="filter-search" placeholder="Buscar na descrição...">
      </div>
      <div class="filter-group">
        <label for="filter-period">Período</label>
        <select id="filter-period">
          <option value="all">Todos</option>
          <option value="current-month">Mês Atual</option>
          <option value="last-month">Mês Anterior</option>
          <option value="last-3-months">Últimos 3 Meses</option>
          <option value="current-year">Ano Atual</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-category">Categoria</label>
        <select id="filter-category">
          <option value="all">Todas</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-type">Tipo</label>
        <select id="filter-type">
          <option value="all">Todos</option>
          <option value="income">Receita</option>
          <option value="expense">Despesa</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-sort">Ordenar por</label>
        <select id="filter-sort">
          <option value="date-desc">Mais Recentes</option>
          <option value="date-asc">Mais Antigas</option>
          <option value="amount-desc">Maior Valor</option>
          <option value="amount-asc">Menor Valor</option>
        </select>
      </div>
    </section>

    <section class="charts-grid">
      <div class="chart-container">
        <h3>Receitas por Categoria</h3>
        <canvas id="chart-pie-income"></canvas>
      </div>
      <div class="chart-container">
        <h3>Gastos por Categoria</h3>
        <canvas id="chart-pie"></canvas>
      </div>
      <div class="chart-container">
        <h3>Receitas vs Despesas</h3>
        <canvas id="chart-bar"></canvas>
      </div>
      <div class="chart-container chart-wide">
        <h3>Evolução Mensal</h3>
        <canvas id="chart-line"></canvas>
      </div>
    </section>

    <section class="transactions-section">
      <h3>Transações Recentes</h3>
      <div class="transactions-list" id="transactions-list"></div>
    </section>
  </main>

  <div class="modal" id="modal-transaction">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Nova Transação</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="form-transaction">
        <div class="form-group">
          <label for="tx-description">Descrição</label>
          <input type="text" id="tx-description" required placeholder="Ex: Salário, Supermercado...">
        </div>
        <div class="form-group">
          <label for="tx-amount">Valor (R$)</label>
          <input type="number" id="tx-amount" step="0.01" min="0.01" required placeholder="0,00">
        </div>
        <div class="form-group">
          <label for="tx-type">Tipo</label>
          <select id="tx-type" required>
            <option value="expense">Despesa</option>
            <option value="income">Receita</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tx-category">Categoria</label>
          <select id="tx-category" required></select>
        </div>
        <div class="form-group">
          <label for="tx-date">Data</label>
          <input type="date" id="tx-date" required>
        </div>
        <input type="hidden" id="tx-id">
        <button type="submit" class="btn btn-primary btn-block">Salvar</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
