<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Strong Finance Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>Strong Finance</h1>
        <p>Gerencie suas finanças e produtividade diária</p>
      </div>

      <div class="login-tabs">
        <button class="tab active" data-tab="login">Entrar</button>
        <button class="tab" data-tab="register">Cadastrar</button>
      </div>

      <form id="form-login" class="login-form active">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label for="login-password">Senha</label>
            <a href="#" onclick="showRecoverForm(); return false;" style="color: var(--primary); font-size: 0.8rem; text-decoration: none; transition: color 0.2s;">Esqueceu a senha?</a>
          </div>
          <input type="password" id="login-password" required placeholder="Sua senha">
        </div>
        <p class="form-error" id="login-error"></p>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>

      <form id="form-register" class="login-form">
        <div class="form-group">
          <label for="register-name">Nome</label>
          <input type="text" id="register-name" required placeholder="Seu nome completo">
        </div>
        <div class="form-group">
          <label for="register-email">E-mail</label>
          <input type="email" id="register-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="register-password">Senha</label>
          <input type="password" id="register-password" required minlength="6" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
          <label for="register-confirm">Confirmar Senha</label>
          <input type="password" id="register-confirm" required placeholder="Repita a senha">
        </div>
        <p class="form-error" id="register-error"></p>
        <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
      </form>

      <form id="form-recover" class="login-form">
        <div id="recover-step-1">
          <div class="form-group">
            <label for="recover-email">E-mail Cadastrado</label>
            <input type="email" id="recover-email" required placeholder="seu@email.com">
          </div>
          <p class="form-error" id="recover-error"></p>
          <p class="form-success" id="recover-success" style="color: var(--success); font-size: 0.85rem; text-align: center; margin-bottom: 1rem;"></p>
          <button type="submit" class="btn btn-primary btn-block">Solicitar Código</button>
        </div>
        
        <div id="recover-step-2" style="display: none;">
          <div class="form-group">
            <label for="reset-token">Código de Recuperação</label>
            <input type="text" id="reset-token" required placeholder="Cole o código recebido">
          </div>
          <div class="form-group">
            <label for="reset-password">Nova Senha</label>
            <input type="password" id="reset-password" required minlength="6" placeholder="Mínimo 6 caracteres">
          </div>
          <div class="form-group">
            <label for="reset-confirm">Confirmar Nova Senha</label>
            <input type="password" id="reset-confirm" required placeholder="Confirme a nova senha">
          </div>
          <p class="form-error" id="reset-error" style="color: var(--danger); font-size: 0.85rem; text-align: center; margin-top: 0.5rem;"></p>
          <button type="button" id="form-reset-pw" class="btn btn-primary btn-block">Redefinir Senha</button>
        </div>

        <p style="text-align: center; margin-top: 1.2rem; font-size: 0.9rem;">
          <a href="#" onclick="showLoginForm(); return false;" style="color: var(--text-muted); text-decoration: none; transition: color 0.2s;">Voltar para o Login</a>
        </p>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
